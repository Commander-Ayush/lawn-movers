<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Services – Admin</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/style.css}"/>
    <style>
        body { padding-top: 0; }
        .admin-nav {
            background: var(--green-deep); padding: 0 6%;
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            position: relative; /* ADD THIS */
        }
        .admin-nav .logo { font-family: 'Fraunces', serif; font-size: 18px; color: white; text-decoration: none; }
        .admin-nav-links a { color: rgba(255,255,255,0.7); text-decoration: none; font-size: 14px; margin-left: 24px; }
        .admin-nav-links a:hover, .admin-nav-links a.active { color: white; }
        .admin-body { padding: 40px 6%; }
        h2 { font-family: 'Fraunces', serif; font-size: 22px; color: var(--green-deep); margin-bottom: 20px; }
        h3 { font-family: 'Fraunces', serif; font-size: 18px; color: var(--green-deep); margin: 32px 0 16px; }

        .service-row {
            background: white; border-radius: 12px; padding: 18px 22px;
            border: 1px solid rgba(74,124,36,0.1); margin-bottom: 10px;
            display: flex; align-items: center; gap: 16px;
        }
        .service-row .icon { font-size: 22px; }
        .service-row .info { flex: 1; }
        .service-row .info strong { font-size: 15px; color: var(--green-deep); display: block; }
        .service-row .info span { font-size: 13px; color: var(--text-soft); }
        .service-row .price { font-size: 13px; font-weight: 600; color: var(--amber); min-width: 120px; }

        .action-btn { border: none; cursor: pointer; padding: 7px 16px; border-radius: 100px; font-size: 13px; font-weight: 500; font-family: 'DM Sans', sans-serif; }
        .btn-delete { background: #fee2e2; color: #dc2626; }
        .btn-delete:hover { background: #dc2626; color: white; }

        .add-form {
            background: white; border-radius: 16px; padding: 28px;
            border: 1px solid rgba(74,124,36,0.1); margin-top: 24px;
        }
        .add-form h3 { margin-top: 0; }
        .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
        label { display: block; font-size: 13px; font-weight: 500; color: var(--text-mid); margin-bottom: 5px; }
        input, select, textarea {
            width: 100%; padding: 10px 14px;
            border: 1.5px solid rgba(74,124,36,0.2); border-radius: 8px;
            font-family: 'DM Sans', sans-serif; font-size: 14px; color: var(--text);
            margin-bottom: 14px; outline: none;
        }
        input:focus, select:focus { border-color: var(--green-mid); }
        .btn-add { background: var(--green-mid); color: white; border: none; cursor: pointer; padding: 11px 28px; border-radius: 100px; font-size: 14px; font-weight: 500; font-family: 'DM Sans', sans-serif; }
        .btn-add:hover { background: var(--green-deep); }
    </style>
</head>
<body>

<nav class="admin-nav">
    <a href="/admin" class="logo">🌿 LawnMovers Admin</a>
    <div class="admin-nav-links">
        <a href="/admin">Requests</a>
        <a href="/admin/services" class="active">Services</a>
        <a href="/">View Site →</a>
    </div>
</nav>

<div class="admin-body">

    <!-- SERVICES -->
    <h2>Services</h2>
    <div th:each="svc : ${services}" class="service-row">
        <span class="icon" th:text="${svc.icon}">🌿</span>
        <div class="info">
            <strong th:text="${svc.name}">Name</strong>
            <span th:text="${svc.description}">Desc</span>
        </div>
        <span class="price" th:text="${svc.price}">$45</span>
        <form th:action="@{/admin/services/{id}/delete(id=${svc.id})}" method="post"
              onsubmit="return confirm('Delete?')">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="action-btn btn-delete">✕ Delete</button>
        </form>
    </div>

    <!-- PLANS -->
    <h2>Pricing Plans</h2>
    <div th:each="plan : ${plans}" class="service-row">
        <span class="icon">📋</span>
        <div class="info">
            <strong th:text="${plan.name}">Plan</strong>
            <span th:text="${plan.description}">subtitle</span>
        </div>
        <span class="price" th:text="'$' + ${plan.price} + '/mo'">$79/mo</span>
        <form th:action="@{/admin/services/{id}/delete(id=${plan.id})}" method="post"
              onsubmit="return confirm('Delete?')">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="action-btn btn-delete">✕ Delete</button>
        </form>
    </div>

    <!-- ADDONS -->
    <h2>Add-Ons</h2>
    <div th:each="addon : ${addons}" class="service-row">
        <span class="icon" th:text="${addon.icon}">🌸</span>
        <div class="info">
            <strong th:text="${addon.name}">Name</strong>
            <span th:text="${addon.description}">Desc</span>
        </div>
        <span class="price" th:text="${addon.price}">$40</span>
        <form th:action="@{/admin/services/{id}/delete(id=${addon.id})}" method="post"
              onsubmit="return confirm('Delete?')">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <button class="action-btn btn-delete">✕ Delete</button>
        </form>
    </div>

    <!-- ADD NEW -->
    <div class="add-form">
        <h3>Add New Item</h3>
        <form th:action="@{/admin/services/add}" method="post">
            <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
            <div class="form-row">
                <div>
                    <label>Type</label>
                    <select name="type">
                        <option value="service">Service</option>
                        <option value="plan">Pricing Plan</option>
                        <option value="addon">Add-On</option>
                    </select>
                </div>
                <div>
                    <label>Icon (emoji)</label>
                    <input type="text" name="icon" placeholder="🌿"/>
                </div>
            </div>
            <div class="form-row">
                <div>
                    <label>Name</label>
                    <input type="text" name="name" placeholder="Lawn Mowing" required/>
                </div>
                <div>
                    <label>Price</label>
                    <input type="text" name="price" placeholder="From $45 / visit"/>
                </div>
            </div>
            <label>Description</label>
            <textarea name="description" placeholder="What's included..."></textarea>
            <label>Featured? (for plans)</label>
            <select name="featured">
                <option value="false">No</option>
                <option value="true">Yes — highlight this plan</option>
            </select>
            <br/><br/>
            <button type="submit" class="btn-add">+ Add Item</button>
        </form>
    </div>

</div>
</body>
</html>
