<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8"/>
    <title>Admin – LawnMovers</title>
    <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@700&family=DM+Sans:wght@400;500&display=swap" rel="stylesheet"/>
    <link rel="stylesheet" th:href="@{/style.css}"/>
    <style>
        body { padding-top: 0 !important; }
        .admin-nav {
            background: var(--green-deep); padding: 0 6%;
            height: 60px; display: flex; align-items: center; justify-content: space-between;
            position: relative; /* ADD THIS */
        }
        .admin-nav .logo {
            font-family: 'Fraunces', serif; font-size: 18px;
            color: white; text-decoration: none;
        }
        .admin-nav-links a {
            color: rgba(255,255,255,0.7); text-decoration: none;
            font-size: 14px; margin-left: 24px;
            transition: color 0.2s;
        }
        .admin-nav-links a:hover, .admin-nav-links a.active { color: white; }
        .admin-body { padding: 40px 6%; }
        .stats-row {
            display: grid; grid-template-columns: repeat(3, 1fr);
            gap: 20px; margin-bottom: 40px;
        }
        .stat-card {
            background: white; border-radius: 16px; padding: 28px;
            border: 1px solid rgba(74,124,36,0.1);
            box-shadow: var(--shadow-sm);
        }
        .stat-card .label { font-size: 12px; color: var(--text-soft); text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
        .stat-card .value { font-family: 'Fraunces', serif; font-size: 42px; font-weight: 700; color: var(--green-deep); }
        .stat-card.pending .value { color: var(--amber); }
        .stat-card.done .value { color: var(--green-mid); }

        .section-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .section-header h2 { font-family: 'Fraunces', serif; font-size: 24px; color: var(--green-deep); }

        table { width: 100%; border-collapse: collapse; background: white; border-radius: 16px; overflow: hidden; box-shadow: var(--shadow-sm); }
        th { background: var(--green-pale); text-align: left; padding: 14px 18px; font-size: 12px; font-weight: 600; color: var(--green-deep); text-transform: uppercase; letter-spacing: 0.06em; }
        td { padding: 16px 18px; font-size: 14px; color: var(--text-mid); border-top: 1px solid rgba(74,124,36,0.07); }
        tr:hover td { background: var(--cream); }

        .badge-pending { background: var(--amber-light); color: var(--amber); padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 500; }
        .badge-done { background: var(--green-pale); color: var(--green-deep); padding: 4px 12px; border-radius: 100px; font-size: 12px; font-weight: 500; }

        .action-btn {
            border: none; cursor: pointer; padding: 7px 16px;
            border-radius: 100px; font-size: 13px; font-weight: 500;
            font-family: 'DM Sans', sans-serif;
        }
        .btn-complete { background: var(--green-pale); color: var(--green-deep); }
        .btn-complete:hover { background: var(--green-mid); color: white; }
        .btn-reopen { background: var(--amber-light); color: var(--amber); }
        .btn-delete { background: #fee2e2; color: #dc2626; margin-left: 6px; }
        .btn-delete:hover { background: #dc2626; color: white; }
    </style>
</head>
<body>

<nav class="admin-nav">
    <a href="/admin" class="logo">🌿 LawnMovers Admin</a>
    <div class="admin-nav-links">
        <a href="/admin" class="active">Requests</a>
        <a href="/admin/services">Services</a>
        <a href="/">View Site →</a>
    </div>
</nav>

<div class="admin-body">

    <!-- Stats -->
    <div class="stats-row">
        <div class="stat-card">
            <div class="label">Total Requests</div>
            <div class="value" th:text="${totalRequests}">0</div>
        </div>
        <div class="stat-card pending">
            <div class="label">Pending</div>
            <div class="value" th:text="${pending}">0</div>
        </div>
        <div class="stat-card done">
            <div class="label">Completed</div>
            <div class="value" th:text="${completed}">0</div>
        </div>
    </div>

    <!-- Requests Table -->
    <div class="section-header">
        <h2>Quote Requests</h2>
    </div>
    <table>
        <thead>
        <tr>
            <th>#</th>
            <th>Name</th>
            <th>Phone</th>
            <th>Service</th>
            <th>Address</th>
            <th>Date</th>
            <th>Submitted</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="req : ${requests}">
            <td th:text="${req.id}">1</td>
            <td th:text="${req.firstName + ' ' + req.lastName}">John Smith</td>
            <td><a th:href="'tel:' + ${req.phone}" th:text="${req.phone}">555-0000</a></td>
            <td th:text="${req.service}">Mowing</td>
            <td th:text="${req.address}">123 Oak St</td>
            <td th:text="${req.preferredDate}">-</td>
            <td th:text="${#temporals.format(req.submittedAt, 'MMM d, h:mm a')}">Jan 1</td>
            <td>
                <span th:if="${!req.completed}" class="badge-pending">Pending</span>
                <span th:if="${req.completed}" class="badge-done">Done</span>
            </td>
            <td>
                <form th:if="${!req.completed}" th:action="@{/admin/requests/{id}/complete(id=${req.id})}" method="post" style="display:inline">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>

                    <button class="action-btn btn-complete">✓ Done</button>
                </form>
                <form th:if="${req.completed}" th:action="@{/admin/requests/{id}/reopen(id=${req.id})}" method="post" style="display:inline">
                    <button class="action-btn btn-reopen">↩ Reopen</button>
                </form>
                <form th:action="@{/admin/requests/{id}/delete(id=${req.id})}" method="post" style="display:inline"
                    onsubmit="return confirm('Delete this request?')">
                    <input type="hidden" th:name="${_csrf.parameterName}" th:value="${_csrf.token}"/>
                    <button class="action-btn btn-delete">✕</button>
                </form>
            </td>
        </tr>
        <tr th:if="${#lists.isEmpty(requests)}">
            <td colspan="9" style="text-align:center;padding:40px;color:var(--text-soft)">No requests yet.</td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
